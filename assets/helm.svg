  <circle cx="27.3" cy="27.3" r="5" fill="#277DC1"/>
  <circle cx="100.7" cy="100.7" r="5" fill="#277DC1"/>
  <circle cx="100.7" cy="27.3" r="5" fill="#277DC1"/>
  <circle cx="27.3" cy="100.7" r="5" fill="#277DC1"/>
