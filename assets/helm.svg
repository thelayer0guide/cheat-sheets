  <circle cx="64" cy="64" r="6" fill="#277DC1"/>
  <!-- Spokes -->
  <line x1="64" y1="46" x2="64" y2="12" stroke="#277DC1" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="82" x2="64" y2="116" stroke="#277DC1" stroke-width="5" stroke-linecap="round"/>
  <line x1="46" y1="64" x2="12" y2="64" stroke="#277DC1" stroke-width="5" stroke-linecap="round"/>
  <line x1="82" y1="64" x2="116" y2="64" stroke="#277DC1" stroke-width="5" stroke-linecap="round"/>
  <line x1="51.3" y1="51.3" x2="27.3" y2="27.3" stroke="#277DC1" stroke-width="5" stroke-linecap="round"/>
  <line x1="76.7" y1="76.7" x2="100.7" y2="100.7" stroke="#277DC1" stroke-width="5" stroke-linecap="round"/>
